services:
  - type: web
    name: prediction-api
    env: python
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: HUGGINGFACE_REPO_ID
        sync: false
      - key: HUGGINGFACE_MODEL_FILE
        value: model.joblib
      - key: EVENT_IMPACT_PCT
        value: "0.10"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_EVENTS_TABLE
        value: events
